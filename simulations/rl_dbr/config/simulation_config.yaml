defaults:
  - _self_
  - products: products
  - resources: resources
  - override hydra/launcher: joblib

# Experiment configuration
experiment:
  number_of_runs: 1
  name: "rldbr"
  save_logs: False
  seed: 123

# Simulation configuration
simulation:
  run_until: 200001
  warmup: 100000
  monitor_interval: 50000
  monitor_warmup: 0
  delivery_mode: "instantly"
  log_queues: False
  print_mode: "metrics"
  memory_size: 200000
  # Schedule
  scheduler_interval: 24
  training: False
  space_scale_buffer: 100
  space_scale_products: 50
  reward:
    lost_sales_multiplier: 3.0
    wip_multiplier: 0.008
    fg_multiplier: 0.004
  # Model (used when training: False). Paths are relative to project root or absolute.
  model_file: simulations\rl_dbr\models\ppo\2602240910_training_rldbr\rldbr_model_5400000_steps.zip
  # vec_norm_file: simulations\rl_dbr\models\ppo\2602232133_training_rldbr\rldbr_model_vecnormalize_6900000_steps.pkl

# Hydra config
hydra:
  run:
    dir: data/experiments/${now:%y%m%d%H%M}_${experiment.name}
  sweep:
    dir: data/experiments
    subdir: ${now:%y%m%d%H%M}_${experiment.name}_${hydra.job.num}
  launcher:
    n_jobs: 1
