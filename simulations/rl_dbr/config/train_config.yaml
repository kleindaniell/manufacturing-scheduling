defaults:
  - _self_
  - products: products
  - resources: resources
  - override hydra/launcher: joblib

training:
  name: "training_rldbr"
  n_envs: 10
  total_timesteps: 60000000
  learning_rate: 0.0005
  learning_rate_schedule: 'linear'
  learning_rate_end: 0.00005
  policy_net_arch: [1024, 1024]
  batch_size: 2048
  n_epochs: 5
  n_steps: 8192
  verbose: 1
  callback_model_prefix: "rldbr_model"
  callback_save_freq: 8000000
  callback_eval_freq: 500000
  tensorboard_log: data/tensorboard_log
  tb_log_name: ${now:%y%m%d%H%M}_${training.name}
  model_save_path: simulations/rl_dbr/models/ppo/${now:%y%m%d%H%M}_${training.name}
  diagnostics_entropy_samples: 512
  resume:
    enabled: False
    model_file: simulations\rl_dbr\models\ppo\2604282118_training_rldbr.zip
    vecnormalize_file: simulations\rl_dbr\models\ppo\2604282118_training_rldbr_vecnormalize.pkl
    reset_num_timesteps: False



# Simulation configuration
environment:
  run_until: 200000
  warmup: 0
  monitor_interval: 5000000
  monitor_warmup: 5000000
  delivery_mode: "instantly"
  log_queues: False
  enable_event_logging: False
  allocate_log_storage: False
  print_mode: None
  memory_size: 10000
  # Schedule
  scheduler_interval: 48
  schedule_max_size: 20
  training: True
  reward:
    reward_base: 10
    throughput_multiplier: 0
    lost_sales_multiplier: 3
    wip_multiplier: 0.002
    fg_multiplier: 0.001
  load_wip_termination_threshold: 0
  lost_sales_termination_threshold: 0
  negative_reward_termination: True
  space_scale_buffer: 1
  space_scale_products: 1

# Hydra config
hydra:
  run:
    dir: data/experiments/rl_train/${now:%y%m%d%H%M}_${training.name}
  sweep:
    dir: data/experiments/rl_train
    subdir: ${now:%y%m%d%H%M}_${training.name}_${hydra.job.num}
  launcher:
    n_jobs: 1


