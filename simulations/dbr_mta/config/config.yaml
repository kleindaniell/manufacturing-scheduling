defaults:
  - _self_
  - products: products
  - resources: resources
  - override hydra/launcher: joblib

# Experiment configuration
experiment:
  number_of_runs: 30
  name: "dbr"
  save_logs: True
  seed: 123

# Simulation configuration
simulation:
  run_until: 200001
  warmup: 100000
  monitor_interval: 50000
  monitor_warmup: 0
  delivery_mode: "instantly"
  log_queues: False
  print_mode: "metrics"
  memory_size: 200000
  # DBR parameters
  scheduler_interval: 24
  order_release_limit: .inf
  ccr_release_limit: False
  buffers_update_multiplyer: 90
  buffers_update_warmup: 20000
  sb_update: True
  cb_update: True
  cb_target_level: 263
  min_lotsize: 0
  max_lotsize: 1

# Hydra config
hydra:
  run:
    dir: data/experiments/${now:%y%m%d%H%M}_${experiment.name}
  sweep:
    dir: data/experiments
    subdir: ${now:%y%m%d%H%M}_${experiment.name}_${hydra.job.num}
  launcher:
    n_jobs: 2


